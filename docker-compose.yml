version: '3.9'

services:
  # PostgreSQL — primary database
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-multiwearable}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # Redis — Celery broker + cache
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - '6379:6379'

  # FastAPI backend (Open Wearables fork)
  backend:
    build: ./backend
    restart: unless-stopped
    ports:
      - '8000:8000'
    env_file:
      - ./backend/config/.env
    depends_on:
      - db
      - redis
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  # Celery worker — background sync + comparator jobs
  worker:
    build: ./backend
    restart: unless-stopped
    env_file:
      - ./backend/config/.env
    depends_on:
      - db
      - redis
    volumes:
      - ./backend:/app
    command: celery -A app.tasks worker --loglevel=info

  # Celery beat — scheduled tasks (Garmin poll, nightly comparator)
  beat:
    build: ./backend
    restart: unless-stopped
    env_file:
      - ./backend/config/.env
    depends_on:
      - db
      - redis
    volumes:
      - ./backend:/app
    command: celery -A app.tasks beat --loglevel=info

volumes:
  postgres_data:
