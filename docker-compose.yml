services:
  # Active v0 runtime: FastAPI only.
  # Supabase Postgres is external; Celery/Redis are deferred until background jobs
  # are needed for comparator/nightly sync.
  backend:
    build: ./backend
    restart: unless-stopped
    ports:
      - '8000:8000'
    env_file:
      - ./backend/config/.env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./backend:/root_project
    command: uvicorn app.main:api --host 0.0.0.0 --port 8000 --reload
